<script>
    const navbar = document.querySelector(".navbar");

    window.addEventListener("scroll", () => {

        if (window.scrollY > 50) {
            navbar.classList.add("scrolled");
        } 
        
        else {
            navbar.classList.remove("scrolled");
        }

    });
    const searchInput = document.querySelector(".search input");
    const items = document.querySelectorAll(".search-results-list li");
    const resultsBox = document.querySelector(".results");

    resultsBox.style.display = "none";

    searchInput.addEventListener("input", function () {

        const value = searchInput.value.toLowerCase();

        if (value.trim() === "") {
            resultsBox.style.display = "none";
            return;
        }

        resultsBox.style.display = "block";

        items.forEach(function(item) {

            const text = item.textContent.toLowerCase();

            if (text.includes(value)) {
                item.style.display = "list-item";
            } else {
                item.style.display = "none";
            }

        });

    });

    const btn = document.getElementById("lang-btn");
    const box = document.getElementById("lang-list");

    box.style.display = "none";

    btn.addEventListener("click", () => {
        box.style.display = box.style.display === "none" ? "block" : "none";
    });

    document.querySelectorAll(".lang-list li").forEach(item => {
        item.addEventListener("click", () => box.style.display = "none");
    });

    function setLanguage(lang) {

        const t = translations[lang];

        document.querySelectorAll("[data-lang]").forEach(element => {

            const key = element.dataset.lang;

            if (t[key]) {
                element.textContent = t[key];
            }

        });

    document.getElementById("videos-hero-title").textContent = t.heroTitle;

    document.getElementById("nav-home").textContent = t.navHome;
    document.getElementById("nav-about").textContent = t.navAbout;
    document.getElementById("nav-music").textContent = t.navMusic;
    document.getElementById("nav-videos").textContent = t.navVideos;
    document.getElementById("nav-files").textContent = t.navFiles;

    document.getElementById("footer-home").textContent = t.footerHome;
    document.getElementById("footer-about").textContent = t.footerAbout;
    document.getElementById("footer-music").textContent = t.footerMusic;
    document.getElementById("footer-videos").textContent = t.footerVideos;
    document.getElementById("footer-files").textContent = t.footerFiles;

    document.querySelector(".search input").placeholder = t.searchPlaceholder;

    localStorage.setItem("language", lang);

    }

    document.getElementById("lang-en").addEventListener("click", () => setLanguage("en"));
    document.getElementById("lang-de").addEventListener("click", () => setLanguage("de"));
    document.getElementById("lang-fr").addEventListener("click", () => setLanguage("fr"));
    document.getElementById("lang-es").addEventListener("click", () => setLanguage("es"));
    document.getElementById("lang-jp").addEventListener("click", () => setLanguage("jp"));
    document.getElementById("lang-zh").addEventListener("click", () => setLanguage("zh"));
    document.getElementById("lang-pt").addEventListener("click", () => setLanguage("pt"));
    document.getElementById("lang-kr").addEventListener("click", () => setLanguage("kr"));
    document.getElementById("lang-pl").addEventListener("click", () => setLanguage("pl"));

    const saved = localStorage.getItem("language");
    if (saved && translations[saved]) setLanguage(saved);
</script>
